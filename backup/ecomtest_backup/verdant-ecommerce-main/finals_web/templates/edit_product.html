{% extends 'base_user.html' %}
{% block content %}
<div class="container mt-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="mb-0">Edit Product</h2>
    <a href="{{ url_for('manage_products') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back to Products</a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="POST" enctype="multipart/form-data" class="needs-validation" novalidate>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label" for="product_name">Product Name</label>
            <input id="product_name" type="text" name="product_name" class="form-control" value="{{ product.name }}" required>
          </div>
          <div class="col-md-3">
            <label class="form-label" for="price">Price</label>
            <input id="price" type="number" step="0.01" min="0" name="price" class="form-control" value="{{ '%.2f'|format(product.price|float) }}" required>
          </div>
          <div class="col-md-3">
            <label class="form-label" for="stock">Stock</label>
            <input id="stock" type="number" min="0" name="stock" class="form-control" value="{{ product.stock }}" required>
          </div>
          <div class="col-12">
            <label class="form-label" for="description">Description</label>
            <textarea id="description" name="description" class="form-control" rows="4">{{ product.description or '' }}</textarea>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="category">Category</label>
            <select id="category" name="category" class="form-select">
              {% set categories = ['Tools','Plants','Soil & Fertilizers','Pots & Planters','Outdoor','Decor','Other'] %}
              {% for c in categories %}
                <option value="{{ c }}" {% if product.category == c %}selected{% endif %}>{{ c }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="images">Replace Image</label>
            <input id="images" type="file" name="images" class="form-control" accept="image/*" multiple>
            {% if product.image %}
              <div class="mt-2">
                <img src="{{ img(product.image, 'products') }}" alt="Current image" class="img-fluid rounded" style="max-height: 160px;">
              </div>
            {% endif %}
          </div>
        </div>
        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Update Product</button>
          <a href="{{ url_for('manage_products') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
